server {
    listen 3000;
    server_name localhost;

    # Root directory of the compiled bundle
    root /usr/share/nginx/html;
    index index.html;

    # Max body size for file attachments (enforce 10MB limit in webserver layer)
    client_max_body_size 10M;

    # Gzip Compression Optimization for high-traffic networks
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # ==============================================================================
    # HARDENED SECURITY HEADERS (OWASP Top 10 Defenses)
    # ==============================================================================

    # Prevent clickjacking attacks by blocking iframe embedding
    add_header X-Frame-Options "DENY" always;

    # Force secure HTTPS connections and protect against MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filtering in legacy browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Enforce strict HTTPS connections (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Referrer Policy to limit external exposure of paths
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Strict Content Security Policy (CSP) to block arbitrary script injections & XSS
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://images.unsplash.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://ais-dev-xgby2q3kr4u56hlfhfzucx-603191559000.europe-west2.run.app;" always;

    # SPA Fallback Routing Control
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for static assets (long-term immutability with cache busting hashes)
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, no-transform, immutable";
    }

    # Block access to hidden configuration files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Error handling routes
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
